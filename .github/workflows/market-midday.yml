name: Market Midday

on:
  schedule:
    - cron: '0 17 * * 1-5'    # Runs ~12:00 PM ET (UTC time)
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: pip install yfinance requests beautifulsoup4
      
      - name: Run bot
        env:
          GROUPME_BOT_ID: ${{ secrets.GROUPME_BOT_ID }}
        run: python bot.py "Market Midday"
